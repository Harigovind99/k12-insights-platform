// ===================== HELPERS =====================
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const tooltip = $('#global-tooltip');

function showTooltip(e, html) {
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  const r = tooltip.getBoundingClientRect();
  let x = e.clientX - r.width/2;
  let y = e.clientY - r.height - 14;
  if (x < 4) x = 4;
  if (x + r.width > window.innerWidth - 4) x = window.innerWidth - r.width - 4;
  if (y < 4) y = e.clientY + 18;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

function num(n) { return n.toLocaleString(); }
function pct(n) { return n.toFixed(1) + '%'; }

function riskClass(r) {
  const m = { 'Low':'risk-low','At-Risk':'risk-atrisk','Moderate':'risk-moderate','Chronic':'risk-chronic' };
  return m[r] || 'risk-low';
}

function downloadCSV(filename, headers, rows) {
  let csv = headers.join(',') + '\n';
  rows.forEach(r => { csv += r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(',') + '\n'; });
  const blob = new Blob([csv], { type:'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ===================== SVG CHART HELPERS =====================
function svgEl(tag, attrs={}, text='') {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  if (text) el.textContent = text;
  return el;
}

function createStackedHBar(container, data, w=540, h=220) {
  const margin = { t:10, r:20, b:40, l:140 };
  const cw = w - margin.l - margin.r;
  const ch = h - margin.t - margin.b;
  const barH = Math.min(28, ch / data.length - 6);
  const svg = svgEl('svg', { width:'100%', height:h, viewBox:`0 0 ${w} ${h}`, class:'w-full' });

  data.forEach((d, i) => {
    const y = margin.t + i * (ch / data.length) + (ch / data.length - barH) / 2;
    // Label
    svg.appendChild(svgEl('text', { x:margin.l-8, y:y+barH/2+4, fill:'#64748b', 'font-size':'11', 'text-anchor':'end', 'font-family':'Inter,sans-serif' }, d.school.length > 18 ? d.school.substring(0,16)+'…' : d.school));
    // Stacked bars
    const segs = [
      { val:d.present, color:'#3b82f6', label:'Present' },
      { val:d.excused, color:'#f59e0b', label:'Excused' },
      { val:d.unexcused, color:'#ef4444', label:'Unexcused' },
      { val:d.tardy, color:'#8b5cf6', label:'Tardy' }
    ];
    let cx = margin.l;
    segs.forEach(s => {
      const bw = (s.val / 100) * cw;
      const rect = svgEl('rect', { x:cx, y:y, width:Math.max(0,bw), height:barH, fill:s.color, class:'chart-bar', 'data-tip': `${d.school}\n${s.label}: ${pct(s.val)}` });
      svg.appendChild(rect);
      cx += bw;
    });
  });

  // X axis
  for (let i = 0; i <= 4; i++) {
    const x = margin.l + (i/4)*cw;
    svg.appendChild(svgEl('line', { x1:x, y1:margin.t, x2:x, y2:h-margin.b, stroke:'#e2e8f0', 'stroke-width':'1' }));
    svg.appendChild(svgEl('text', { x:x, y:h-margin.b+16, fill:'#94a3b8', 'font-size':'10', 'text-anchor':'middle', 'font-family':'Inter,sans-serif' }, (i*25)+'%'));
  }

  container.innerHTML = '';
  container.appendChild(svg);

  // Legend
  const legend = document.createElement('div');
  legend.className = 'flex flex-wrap gap-4 mt-3 justify-center';
  [{ l:'Present', c:'#3b82f6' },{ l:'Excused', c:'#f59e0b' },{ l:'Unexcused', c:'#ef4444' },{ l:'Tardy', c:'#8b5cf6' }].forEach(s => {
    legend.innerHTML += `<div class="flex items-center gap-1.5 text-xs text-txt-muted"><div class="w-3 h-3 rounded-sm" style="background:${s.c}"></div>${s.l}</div>`;
  });
  container.appendChild(legend);
  attachChartTooltips(container);
}

function createDonut(container, data, centerText, w=280, h=280) {
  const cx = w/2, cy = h/2, r = 90, inner = 55;
  const svg = svgEl('svg', { width:'100%', height:h, viewBox:`0 0 ${w} ${h}`, class:'w-full max-w-[280px] mx-auto' });
  let startAngle = -90;
  data.forEach(d => {
    const angle = (d.pct / 100) * 360;
    const endAngle = startAngle + angle;
    const largeArc = angle > 180 ? 1 : 0;
    const x1 = cx + r * Math.cos(startAngle * Math.PI / 180);
    const y1 = cy + r * Math.sin(startAngle * Math.PI / 180);
    const x2 = cx + r * Math.cos(endAngle * Math.PI / 180);
    const y2 = cy + r * Math.sin(endAngle * Math.PI / 180);
    const ix1 = cx + inner * Math.cos(endAngle * Math.PI / 180);
    const iy1 = cy + inner * Math.sin(endAngle * Math.PI / 180);
    const ix2 = cx + inner * Math.cos(startAngle * Math.PI / 180);
    const iy2 = cy + inner * Math.sin(startAngle * Math.PI / 180);
    const path = `M${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} L${ix1},${iy1} A${inner},${inner} 0 ${largeArc},0 ${ix2},${iy2} Z`;
    const p = svgEl('path', { d:path, fill:d.color, class:'chart-bar', 'data-tip':`${d.label}\n${num(d.count)} (${d.pct}%)` });
    svg.appendChild(p);
    startAngle = endAngle;
  });
  // Center text
  svg.appendChild(svgEl('text', { x:cx, y:cy-6, fill:'#1e293b', 'font-size':'22', 'font-weight':'700', 'text-anchor':'middle', 'font-family':'Inter,sans-serif' }, centerText));
  svg.appendChild(svgEl('text', { x:cx, y:cy+14, fill:'#64748b', 'font-size':'11', 'text-anchor':'middle', 'font-family':'Inter,sans-serif' }, 'Total Absences'));

  container.innerHTML = '';
  container.appendChild(svg);
  const legend = document.createElement('div');
  legend.className = 'flex flex-wrap gap-3 mt-3 justify-center';
  data.forEach(d => {
    legend.innerHTML += `<div class="flex items-center gap-1.5 text-xs text-txt-muted"><div class="w-3 h-3 rounded-sm" style="background:${d.color}"></div>${d.label} (${d.pct}%)</div>`;
  });
  container.appendChild(legend);
  attachChartTooltips(container);
}

function createVerticalBar(container, data, w=520, h=260, highlightFri=true) {
  const margin = { t:10, r:20, b:40, l:50 };
  const cw = w - margin.l - margin.r;
  const ch = h - margin.t - margin.b;
  const maxVal = Math.max(...data.map(d=>d.count)) * 1.15;
  const barW = Math.min(48, cw / data.length - 12);
  const svg = svgEl('svg', { width:'100%', height:h, viewBox:`0 0 ${w} ${h}`, class:'w-full' });
  const total = data.reduce((s,d)=>s+d.count,0);

  // Grid
  for (let i = 0; i <= 4; i++) {
    const y = margin.t + (i/4)*ch;
    svg.appendChild(svgEl('line', { x1:margin.l, y1:y, x2:w-margin.r, y2:y, stroke:'#e2e8f0', 'stroke-width':'1' }));
    svg.appendChild(svgEl('text', { x:margin.l-8, y:y+4, fill:'#94a3b8', 'font-size':'10', 'text-anchor':'end', 'font-family':'Inter,sans-serif' }, num(Math.round(maxVal*(1-i/4)))));
  }

  data.forEach((d, i) => {
    const x = margin.l + i*(cw/data.length) + (cw/data.length - barW)/2;
    const barH = (d.count / maxVal) * ch;
    const y = margin.t + ch - barH;
    const color = (highlightFri && d.day === 'Fri') ? '#ef4444' : '#3b82f6';
    svg.appendChild(svgEl('rect', { x:x, y:y, width:barW, height:barH, fill:color, rx:'2', class:'chart-bar', 'data-tip':`${d.day}: ${num(d.count)} absences\n${pct(d.count/total*100)} of weekly total` }));
    svg.appendChild(svgEl('text', { x:x+barW/2, y:h-margin.b+16, fill:'#64748b', 'font-size':'11', 'text-anchor':'middle', 'font-family':'Inter,sans-serif' }, d.day));
  });

  container.innerHTML = '';
  container.appendChild(svg);
  const note = document.createElement('div');
  note.className = 'text-xs text-danger-500 font-medium mt-2 text-center';
  note.textContent = 'Fridays account for 26% of all absences';
  container.appendChild(note);
  attachChartTooltips(container);
}

function createLineChart(container, data, w=540, h=280) {
  const margin = { t:20, r:30, b:40, l:45 };
  const cw = w - margin.l - margin.r;
  const ch = h - margin.t - margin.b;
  const yMin = 88, yMax = 98;
  const svg = svgEl('svg', { width:'100%', height:h, viewBox:`0 0 ${w} ${h}`, class:'w-full' });

  // Grid
  for (let i = 0; i <= 5; i++) {
    const y = margin.t + (i/5)*ch;
    const val = yMax - (i/5)*(yMax-yMin);
    svg.appendChild(svgEl('line', { x1:margin.l, y1:y, x2:w-margin.r, y2:y, stroke:'#e2e8f0', 'stroke-width':'1' }));
    svg.appendChild(svgEl('text', { x:margin.l-8, y:y+4, fill:'#94a3b8', 'font-size':'10', 'text-anchor':'end', 'font-family':'Inter,sans-serif' }, pct(val)));
  }

  // Target line at 96%
  const targetY = margin.t + ((yMax-96)/(yMax-yMin))*ch;
  svg.appendChild(svgEl('line', { x1:margin.l, y1:targetY, x2:w-margin.r, y2:targetY, stroke:'#10b981', 'stroke-width':'1', 'stroke-dasharray':'6,4' }));
  svg.appendChild(svgEl('text', { x:w-margin.r+4, y:targetY+3, fill:'#10b981', 'font-size':'9', 'font-family':'Inter,sans-serif' }, 'Goal'));

  const getX = i => margin.l + (i/(data.length-1))*cw;
  const getY = v => margin.t + ((yMax-v)/(yMax-yMin))*ch;

  // Area fill
  let areaPath = `M${getX(0)},${getY(data[0].cur)}`;
  data.forEach((d,i) => { if (i>0) areaPath += ` L${getX(i)},${getY(d.cur)}`; });
  areaPath += ` L${getX(data.length-1)},${margin.t+ch} L${getX(0)},${margin.t+ch} Z`;
  svg.appendChild(svgEl('path', { d:areaPath, fill:'#3b82f6', opacity:'0.08' }));

  // Prior year line
  let prevPath = data.map((d,i) => `${i===0?'M':'L'}${getX(i)},${getY(d.prev)}`).join(' ');
  svg.appendChild(svgEl('polyline', { points:data.map((d,i)=>`${getX(i)},${getY(d.prev)}`).join(' '), fill:'none', stroke:'#94a3b8', 'stroke-width':'2', 'stroke-dasharray':'6,4' }));

  // Current year line
  svg.appendChild(svgEl('polyline', { points:data.map((d,i)=>`${getX(i)},${getY(d.cur)}`).join(' '), fill:'none', stroke:'#3b82f6', 'stroke-width':'2.5' }));

  // Points & labels
  data.forEach((d,i) => {
    const x = getX(i);
    // Current
    svg.appendChild(svgEl('circle', { cx:x, cy:getY(d.cur), r:'4', fill:'#3b82f6', stroke:'#fff', 'stroke-width':'2', class:'chart-bar', 'data-tip':`${d.m}\nCurrent: ${pct(d.cur)}\nPrior: ${pct(d.prev)}\nΔ ${(d.cur-d.prev>0?'+':'')}${pct(d.cur-d.prev)}` }));
    // Prev
    svg.appendChild(svgEl('circle', { cx:x, cy:getY(d.prev), r:'3', fill:'#94a3b8', stroke:'#fff', 'stroke-width':'1.5' }));
    // X label
    svg.appendChild(svgEl('text', { x:x, y:h-margin.b+16, fill:'#64748b', 'font-size':'10', 'text-anchor':'middle', 'font-family':'Inter,sans-serif' }, d.m));
  });

  container.innerHTML = '';
  container.appendChild(svg);
  const legend = document.createElement('div');
  legend.className = 'flex gap-5 mt-2 justify-center';
  legend.innerHTML = '<div class="flex items-center gap-1.5 text-xs text-txt-muted"><div class="w-4 h-0.5 bg-brand-500 rounded"></div>2024-25</div><div class="flex items-center gap-1.5 text-xs text-txt-muted"><div class="w-4 h-0.5 bg-txt-light rounded" style="border-top:1px dashed #94a3b8;height:0"></div>2023-24</div><div class="flex items-center gap-1.5 text-xs text-txt-muted"><div class="w-4 h-0.5 rounded" style="border-top:1px dashed #10b981;height:0"></div>District Goal (96%)</div>';
  container.appendChild(legend);
  attachChartTooltips(container);
}

function createHeatmap(container, data, cols, w=680, h=200) {
  const margin = { t:30, r:20, b:10, l:110 };
  const cw = w - margin.l - margin.r;
  const ch = h - margin.t - margin.b;
  const cellW = cw / cols.length;
  const cellH = ch / data.length;
  const allVals = data.flatMap(d=>d.data);
  const minV = Math.min(...allVals);
  const maxV = Math.max(...allVals);
  const svg = svgEl('svg', { width:'100%', height:h, viewBox:`0 0 ${w} ${h}`, class:'w-full' });

  // Col headers
  cols.forEach((c,i) => {
    svg.appendChild(svgEl('text', { x:margin.l+i*cellW+cellW/2, y:margin.t-8, fill:'#64748b', 'font-size':'10', 'text-anchor':'middle', 'font-family':'Inter,sans-serif' }, c));
  });

  data.forEach((row,ri) => {
    svg.appendChild(svgEl('text', { x:margin.l-8, y:margin.t+ri*cellH+cellH/2+4, fill:'#64748b', 'font-size':'11', 'text-anchor':'end', 'font-family':'Inter,sans-serif' }, row.school));
    row.data.forEach((val,ci) => {
      const intensity = (val - minV) / (maxV - minV);
      const r = Math.round(255 - intensity * (255-220));
      const g = Math.round(255 - intensity * (255-50));
      const b = Math.round(255 - intensity * (255-50));
      const rect = svgEl('rect', {
        x:margin.l+ci*cellW+1, y:margin.t+ri*cellH+1,
        width:cellW-2, height:cellH-2,
        fill:`rgb(${r},${g},${b})`, rx:'3', class:'heatmap-cell',
        'data-tip':`${row.school}\n${cols[ci]}: ${pct(val)}`
      });
      svg.appendChild(rect);
      svg.appendChild(svgEl('text', {
        x:margin.l+ci*cellW+cellW/2, y:margin.t+ri*cellH+cellH/2+4,
        fill: intensity > 0.5 ? '#fff' : '#1e293b', 'font-size':'10', 'font-weight':'600',
        'text-anchor':'middle', 'font-family':'Inter,sans-serif'
      }, pct(val)));
    });
  });
  container.innerHTML = '';
  container.appendChild(svg);
  attachChartTooltips(container);
}

function createHorizontalBar(container, data, w=500, h=320, threshold=10) {
  const margin = { t:10, r:40, b:20, l:160 };
  const cw = w - margin.l - margin.r;
  const ch = h - margin.t - margin.b;
  const maxVal = Math.max(...data.map(d=>d.rate)) * 1.15;
  const barH = Math.min(22, ch / data.length - 4);
  const svg = svgEl('svg', { width:'100%', height:h, viewBox:`0 0 ${w} ${h}`, class:'w-full' });

  // Threshold line
  const thX = margin.l + (threshold/maxVal)*cw;
  svg.appendChild(svgEl('line', { x1:thX, y1:margin.t, x2:thX, y2:h-margin.b, stroke:'#ef4444', 'stroke-width':'1', 'stroke-dasharray':'4,3' }));
  svg.appendChild(svgEl('text', { x:thX, y:margin.t-4, fill:'#ef4444', 'font-size':'9', 'text-anchor':'middle', 'font-family':'Inter,sans-serif' }, threshold+'%'));

  data.forEach((d,i) => {
    const y = margin.t + i*(ch/data.length) + (ch/data.length - barH)/2;
    const bw = (d.rate/maxVal)*cw;
    const color = d.rate >= threshold ? '#ef4444' : d.rate >= threshold*0.7 ? '#f59e0b' : '#3b82f6';
    svg.appendChild(svgEl('text', { x:margin.l-8, y:y+barH/2+4, fill:'#64748b', 'font-size':'10', 'text-anchor':'end', 'font-family':'Inter,sans-serif' }, d.group.length > 22 ? d.group.substring(0,20)+'…' : d.group));
    svg.appendChild(svgEl('rect', { x:margin.l, y:y, width:Math.max(0,bw), height:barH, fill:color, rx:'2', class:'chart-bar', 'data-tip':`${d.group}: ${pct(d.rate)}` }));
    svg.appendChild(svgEl('text', { x:margin.l+bw+6, y:y+barH/2+4, fill:'#1e293b', 'font-size':'10', 'font-weight':'600', 'font-family':'Inter,sans-serif' }, pct(d.rate)));
  });
  container.innerHTML = '';
  container.appendChild(svg);
  attachChartTooltips(container);
}

function attachChartTooltips(container) {
  container.querySelectorAll('[data-tip]').forEach(el => {
    el.addEventListener('mouseenter', e => showTooltip(e, el.getAttribute('data-tip').replace(/\n/g,'<br>')));
    el.addEventListener('mousemove', e => showTooltip(e, el.getAttribute('data-tip').replace(/\n/g,'<br>')));
    el.addEventListener('mouseleave', hideTooltip);
  });
}

// ===================== RENDER FUNCTIONS =====================
function renderDomainTabs() {
  const container = $('#domain-tabs');
  container.innerHTML = '';
  DOMAIN_TABS.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = `flex-shrink-0 px-3 py-2.5 text-xs font-medium whitespace-nowrap border-b-2 transition-colors ${tab === state.activeDomain ? 'border-brand-500 text-brand-500' : 'border-transparent text-txt-muted hover:text-txt-primary hover:border-gray-300'}`;
    btn.textContent = tab;
    btn.addEventListener('click', () => {
      state.activeDomain = tab;
      state.activeSubTab = tab === 'Attendance' ? 'overview' : 'main';
      renderDomainTabs();
      renderContent();
      updateBreadcrumb();
    });
    container.appendChild(btn);
  });
}

function updateBreadcrumb() {
  $('#breadcrumb-domain').textContent = state.activeDomain;
  const subMap = { overview:'Overview', quarterly:'Quarterly Trending Risk', chronic:'Chronic Absenteeism', main:'' };
  $('#breadcrumb-sub').textContent = subMap[state.activeSubTab] || state.activeDomain;
}

function renderContent() {
  const main = $('#main-content');
  main.scrollTop = 0;
  const role = state.role;
  const isTeacher = role === 'teacher';
  const isCommunity = role === 'community-partner';

  if (state.activeDomain === 'Attendance') {
    renderAttendance(main, isTeacher, isCommunity);
  } else if (state.activeDomain === 'Assessments') {
    renderAssessments(main);
  } else if (state.activeDomain === 'Early Warning') {
    renderPlaceholder(main, 'Early Warning', 'Coming Soon — Early Warning indicators, risk scoring, and intervention tracking will be available in the next release.', 'alert-triangle');
  } else if (state.activeDomain === 'Academics') {
    renderPlaceholder(main, 'Academics', 'Coming Soon — Academic performance dashboards, grade distributions, and GPA analytics are in development.', 'book-open');
  } else {
    renderPlaceholder(main, state.activeDomain, `This domain is in the roadmap — ${state.activeDomain} dashboards will be available in Phase 2.`, 'clock');
  }

  refreshIcons();
}

function renderRiskMatrix() {
  const c = document.getElementById('risk-matrix-container');
  if (!c) return;
  const colors = ['#10b981','#f59e0b','#f97316','#ef4444'];
  const bgColors = ['bg-success-50','bg-warning-50','','bg-danger-50'];
  const maxVal = Math.max(...RISK_MATRIX.flat());

  let html = `<div class="overflow-x-auto"><table class="w-full text-xs"><thead><tr>
    <th class="px-3 py-2 text-[10px] font-semibold text-txt-muted uppercase">Q2 ↓ / Q3 →</th>
    ${RISK_LABELS.map((l,i) => `<th class="px-3 py-2 text-center text-[10px] font-semibold uppercase" style="color:${colors[i]}">${l}</th>`).join('')}
    </tr></thead><tbody>`;
  RISK_MATRIX.forEach((row,ri) => {
    html += `<tr><td class="px-3 py-2 font-semibold" style="color:${colors[ri]}">${RISK_LABELS[ri]}</td>`;
    row.forEach((val,ci) => {
      const intensity = val / maxVal;
      const isDiag = ri === ci;
      const alpha = Math.round(intensity * 60 + 10);
      const bg = isDiag ? `rgba(${ri===0?'16,185,129':ri===1?'245,158,11':ri===2?'249,115,22':'239,68,68'},0.${alpha})` : `rgba(${ri>ci?'16,185,129':'239,68,68'},0.${Math.max(5,alpha-20)})`;
      html += `<td class="px-3 py-2 text-center font-bold tabular-nums" style="background:${bg};${isDiag?'font-weight:800;':''}"><span>${num(val)}</span></td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  c.innerHTML = html;
}

function renderAssessmentCharts() {
  // RIT Distribution (histogram)
  const c1 = document.getElementById('chart-rit-dist');
  if (c1) {
    const bins = [
      { range:'160-170', count:120 },{ range:'170-180', count:340 },{ range:'180-190', count:620 },
      { range:'190-200', count:980 },{ range:'200-210', count:1240 },{ range:'210-220', count:1180 },
      { range:'220-230', count:890 },{ range:'230-240', count:540 },{ range:'240-250', count:280 },{ range:'250-260', count:110 }
    ];
    const w=520, h=240, margin={t:10,r:20,b:40,l:50};
    const cw=w-margin.l-margin.r, ch=h-margin.t-margin.b;
    const maxVal = Math.max(...bins.map(b=>b.count))*1.1;
    const barW = cw/bins.length - 2;
    const svg = svgEl('svg',{width:'100%',height:h,viewBox:`0 0 ${w} ${h}`,class:'w-full'});
    for(let i=0;i<=4;i++){
      const y=margin.t+(i/4)*ch;
      svg.appendChild(svgEl('line',{x1:margin.l,y1:y,x2:w-margin.r,y2:y,stroke:'#e2e8f0','stroke-width':'1'}));
      svg.appendChild(svgEl('text',{x:margin.l-8,y:y+4,fill:'#94a3b8','font-size':'10','text-anchor':'end','font-family':'Inter,sans-serif'},num(Math.round(maxVal*(1-i/4)))));
    }
    // Norm line at 210-220 bin
    const normX = margin.l + 5*(cw/bins.length) + barW/2;
    svg.appendChild(svgEl('line',{x1:normX,y1:margin.t,x2:normX,y2:h-margin.b,stroke:'#10b981','stroke-width':'1','stroke-dasharray':'5,3'}));
    svg.appendChild(svgEl('text',{x:normX+4,y:margin.t+12,fill:'#10b981','font-size':'9','font-family':'Inter,sans-serif'},'Grade Norm'));

    bins.forEach((b,i) => {
      const x=margin.l+i*(cw/bins.length)+1;
      const bh=(b.count/maxVal)*ch;
      const y=margin.t+ch-bh;
      svg.appendChild(svgEl('rect',{x:x,y:y,width:barW,height:bh,fill:'#3b82f6',rx:'1',class:'chart-bar','data-tip':`${b.range} RIT\n${num(b.count)} students`}));
      svg.appendChild(svgEl('text',{x:x+barW/2,y:h-margin.b+14,fill:'#64748b','font-size':'9','text-anchor':'middle','font-family':'Inter,sans-serif',transform:`rotate(-30,${x+barW/2},${h-margin.b+14})`},b.range));
    });
    c1.innerHTML='';
    c1.appendChild(svg);
    attachChartTooltips(c1);
  }

  // Growth scatter
  const c2 = document.getElementById('chart-growth-scatter');
  if (c2) {
    const w=520,h=260,margin={t:20,r:20,b:40,l:50};
    const cw=w-margin.l-margin.r,ch=h-margin.t-margin.b;
    const svg = svgEl('svg',{width:'100%',height:h,viewBox:`0 0 ${w} ${h}`,class:'w-full'});
    // Grid
    for(let i=0;i<=4;i++){
      const y=margin.t+(i/4)*ch;
      svg.appendChild(svgEl('line',{x1:margin.l,y1:y,x2:w-margin.r,y2:y,stroke:'#e2e8f0','stroke-width':'1'}));
    }
    svg.appendChild(svgEl('text',{x:w/2,y:h-4,fill:'#64748b','font-size':'10','text-anchor':'middle','font-family':'Inter,sans-serif'},'Fall RIT Score'));
    svg.appendChild(svgEl('text',{x:14,y:h/2,fill:'#64748b','font-size':'10','text-anchor':'middle','font-family':'Inter,sans-serif',transform:`rotate(-90,14,${h/2})`},'Growth Points'));

    // Scatter points
    const points = [];
    for(let i=0;i<60;i++){
      const fallRIT = 170 + Math.random()*80;
      const growth = -2 + Math.random()*14;
      const met = growth >= 4;
      points.push({fallRIT, growth, met});
    }
    const xMin=170,xMax=250,yMin2=-2,yMax2=12;
    points.forEach(p => {
      const x = margin.l + ((p.fallRIT-xMin)/(xMax-xMin))*cw;
      const y = margin.t + ((yMax2-p.growth)/(yMax2-yMin2))*ch;
      svg.appendChild(svgEl('circle',{cx:x,cy:y,r:'4',fill:p.met?'#10b981':'#ef4444',opacity:'0.7',class:'chart-bar','data-tip':`Fall RIT: ${Math.round(p.fallRIT)}\nGrowth: ${p.growth.toFixed(1)}\n${p.met?'Met Target':'Below Target'}`}));
    });
    // Target line at growth=4
    const tY = margin.t + ((yMax2-4)/(yMax2-yMin2))*ch;
    svg.appendChild(svgEl('line',{x1:margin.l,y1:tY,x2:w-margin.r,y2:tY,stroke:'#64748b','stroke-width':'1','stroke-dasharray':'4,3'}));
    svg.appendChild(svgEl('text',{x:w-margin.r+2,y:tY-4,fill:'#64748b','font-size':'9','font-family':'Inter,sans-serif'},'Target'));

    c2.innerHTML='';
    c2.appendChild(svg);
    const legend = document.createElement('div');
    legend.className='flex gap-4 mt-2 justify-center';
    legend.innerHTML='<div class="flex items-center gap-1.5 text-xs text-txt-muted"><div class="w-3 h-3 rounded-full bg-success-500"></div>Met Growth Target</div><div class="flex items-center gap-1.5 text-xs text-txt-muted"><div class="w-3 h-3 rounded-full bg-danger-500"></div>Below Target</div>';
    c2.appendChild(legend);
    attachChartTooltips(c2);
  }
}

// ===================== EVENT HANDLERS =====================
function attachFilterListeners() {
  // Filters are visual prototype — they show interactivity
  document.querySelectorAll('.filter-select').forEach(sel => {
    sel.addEventListener('change', () => {/* prototype */});
  });
}

function attachTableListeners() {
  const search = document.getElementById('student-search');
  if (search) {
    search.addEventListener('input', e => {
      state.searchQuery = e.target.value;
      renderStudentRows();
    });
  }
  document.querySelectorAll('.sortable-th').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.sort;
      if (state.sortCol === col) {
        state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        state.sortCol = col;
        state.sortDir = 'asc';
      }
      renderStudentRows();
    });
  });
}

function attachDownloadListeners() {
  document.querySelectorAll('.download-csv').forEach(btn => {
    btn.addEventListener('click', () => {
      downloadCSV('attendance_data.csv',
        ['Student ID','Name','School','Grade','Days Present','Excused Absent','Unexcused Absent','Tardies','Attendance Rate','Risk Level'],
        STUDENTS_DATA.map(s => [s.id,s.name,s.school,s.grade,s.present,s.excAbsent,s.unexAbsent,s.tardies,s.rate,s.risk])

// ===================== SIDEBAR =====================
function toggleSidebar() {
  state.sidebarCollapsed = !state.sidebarCollapsed;
  const sidebar = $('#sidebar');
  if (state.sidebarCollapsed) {
    sidebar.style.width = '64px';
    sidebar.style.minWidth = '64px';
    sidebar.classList.add('sidebar-collapsed');
  } else {
    sidebar.style.width = '220px';
    sidebar.style.minWidth = '220px';
    sidebar.classList.remove('sidebar-collapsed');
  }
}

// ===================== ROLE SWITCHER =====================
function updateRole(role) {
  state.role = role;
  const banner = $('#role-banner');
  const bannerText = $('#role-banner-text');
  if (role === 'district-admin') {
    banner.classList.add('hidden');
  } else {
    banner.classList.remove('hidden');
    const labels = {
      'school-admin':'Viewing as: School Admin – Data scoped to your assigned school(s)',
      'teacher':'Viewing as: Teacher – Data scoped to Lincoln Middle School',
      'community-partner':'Viewing as: Community Partner – Student-level detail is hidden'
    };
    bannerText.textContent = labels[role] || '';
  }
  renderContent();
}

// ===================== INIT =====================
function init() {
  renderDomainTabs();
  renderContent();
  updateBreadcrumb();
  renderSchemaModal();

  // Sidebar toggle
  document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);

  // Sidebar nav
  document.querySelectorAll('#sidebar-nav .nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('#sidebar-nav .nav-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
    });
  });

  // Role switcher
  document.getElementById('role-switcher').addEventListener('change', e => updateRole(e.target.value));

  // Schema modal
  document.getElementById('schema-btn').addEventListener('click', () => {
    document.getElementById('schema-modal').classList.remove('hidden');
    refreshIcons();
  });
  document.getElementById('schema-close').addEventListener('click', () => {
    document.getElementById('schema-modal').classList.add('hidden');
  });
  document.getElementById('schema-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('schema-modal')) {
      document.getElementById('schema-modal').classList.add('hidden');
    }
  });

  refreshIcons();
}

// Guard lucide and init
if (typeof lucide !== 'undefined' && typeof lucide.createIcons === 'function') {
  lucide.createIcons();
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

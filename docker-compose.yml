services:
  # ─── Backend (Express + nodemon) ───────────────────────────────────────────
  # Connects to the external DASL SQL Server (NTLM auth) — see backend/.env.
  # No local database container: this app does not manage its own DB.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: k12_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: ["npm", "run", "dev"]

  # ─── Frontend (Vite dev server) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: k12_frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.local
    environment:
      # Vite's dev proxy runs inside this container, so "localhost" would
      # point at itself — route /api calls to the backend service instead.
      VITE_PROXY_TARGET: http://backend:5000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host"]

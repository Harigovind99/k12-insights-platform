version: '3.9'

services:
  # ─── MySQL Database ───────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: k12_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${DB_NAME:-k12_insights}
      MYSQL_USER:          ${DB_USER:-k12user}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-k12password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (Express) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: k12_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:    ${NODE_ENV:-development}
      PORT:        ${PORT:-5000}
      DB_HOST:     db
      DB_PORT:     3306
      DB_NAME:     ${DB_NAME:-k12_insights}
      DB_USER:     ${DB_USER:-k12user}
      DB_PASSWORD: ${DB_PASSWORD:-k12password}
      JWT_SECRET:  ${JWT_SECRET:-change_me_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      LOG_LEVEL:   ${LOG_LEVEL:-info}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: ["node", "server.js"]

  # ─── Frontend (Vite dev server) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: k12_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL:           http://localhost:5000
      VITE_APP_ENV:           development
      VITE_ENABLE_MOCK_DATA:  false
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host"]

volumes:
  db_data:
